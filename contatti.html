<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti | Rossana Palermo</title>

    <!-- Open Graph Tags -->
    <meta property="og:title" content="Contatti | Rossana Palermo">
    <meta property="og:description" content="Hai un progetto in mente? Scrivimi, lavoriamo insieme!">
    <meta property="og:image" content="assets/img/logo.png">
    <meta property="og:url" content="https://rossana-palermo.github.io/portfolio/contatti.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="it_IT">

    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <ul class="nav-links d-flex gap-3 list-unstyled mb-0">
                <li><a href="index.html" class="nav-link text-white">Home</a></li>
                <li><a href="cv.html" class="nav-link text-white">Il mio CV</a></li>
                <li><a href="contatti.html" class="nav-link text-white">Contatti</a></li>
            </ul>
        </div>
    </nav>

    <section class="contact-section">
        <h1>Lavoriamo <span class="highlight">Insieme</span></h1>
        <p class="contact-quote">"Il segreto del successo è non essere mai grigi."</p>

        <div class="contact-container">

            <div class="contact-info">
                <h2>Get in Touch</h2>

                <div class="contact-item">
                    <p class="contact-label"><i class="fas fa-envelope"></i> Email</p>
                    <a href="mailto:palermorossana10@gmail.com">palermorossana10@gmail.com</a>
                </div>

                <div class="contact-item">
                    <p class="contact-label"><i class="fab fa-linkedin"></i> LinkedIn</p>
                    <a href="https://www.linkedin.com/in/rossana-palermo" target="_blank">linkedin.com/in/rossana-palermo</a>
                </div>

                <div class="contact-item">
                    <p class="contact-label"><i class="fab fa-instagram"></i> Instagram</p>
                    <a href="https://www.instagram.com/rossana_palermo_" target="_blank">@rossana_palermo_</a>
                </div>
            </div>

            <div class="contact-form-box">
                <form id="contact-form">
                    <input
                        type="text"
                        name="nome"
                        id="nome"
                        placeholder="Il tuo Nome *"
                        required
                        class="form-input form-control mb-3">
                    <input
                        type="email"
                        name="email"
                        id="email"
                        placeholder="La tua Email *"
                        required
                        class="form-input form-control mb-3">
                    <textarea
                        name="messaggio"
                        id="messaggio"
                        placeholder="Raccontami il tuo progetto... *"
                        rows="4"
                        required
                        class="form-input form-control mb-3"></textarea>
                    <button type="submit" id="btn-invia" class="btn-submit btn btn-danger w-100">Invia Richiesta</button>
                    <p id="form-feedback" style="margin-top: 15px; text-align: center; display: none;"></p>
                </form>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Rossana Palermo - Full Stack Web Developer</p>
    </footer>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        emailjs.init('1YIlvLzJTo24I0Os1');

        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const btn = document.getElementById('btn-invia');
            const feedback = document.getElementById('form-feedback');
            btn.textContent = 'Invio in corso...';
            btn.disabled = true;

            const params = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                messaggio: document.getElementById('messaggio').value
            };

            emailjs.send('service_d9e39eo', 'template_c7x6c3l', params)
                .then(function() {
                    feedback.textContent = '✅ Messaggio inviato! Ti risponderò presto.';
                    feedback.style.color = '#ff007f';
                    feedback.style.display = 'block';
                    document.getElementById('contact-form').reset();
                    btn.textContent = 'Invia Richiesta';
                    btn.disabled = false;
                }, function(error) {
                    feedback.textContent = '❌ Qualcosa è andato storto. Riprova!';
                    feedback.style.color = 'red';
                    feedback.style.display = 'block';
                    btn.textContent = 'Invia Richiesta';
                    btn.disabled = false;
                });
        });
    </script>

</body>
</html>
